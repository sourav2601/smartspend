spring.application.name=smartspend-backend

# --- Database ---
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/smartspend}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres123}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# --- Server ---
server.port=${PORT:8080}

# --- JWT ---
jwt.secret=${JWT_SECRET:dev-only-secret-key-please-override-this-in-production-env-vars-1234567890}
jwt.expiration-ms=${JWT_EXPIRATION_MS:604800000}

# --- ML microservice ---
ml.service.base-url=${ML_SERVICE_URL:http://localhost:8000}

# --- Gemini API (Google AI Studio, free tier) ---
gemini.api.key=${GEMINI_API_KEY:}
gemini.api.model=${GEMINI_MODEL:gemini-2.5-flash}

# --- CORS ---
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
